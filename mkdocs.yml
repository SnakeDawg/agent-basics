site_name: Catalogue
site_description: A subject-agnostic catalogue + strategy + decisions site, auto-published from this repo.

# docs_dir is the conventional `docs/`. Content from outside docs/ (root README, .claude/agents/,
# .claude/skills/, .claude/shared/) is assembled into docs/ at build time by scripts/build-docs.sh.
# That keeps the source of truth in its native locations while letting MkDocs build from a single tree.
docs_dir: docs
site_dir: site

# Repo-internal references that live under docs/ but are not part of the published catalogue.
# Links to these from in-site pages are rewritten to GitHub blob URLs by scripts/build-docs.sh.
exclude_docs: |
  anthropic-spec.md

theme:
  name: material
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.indexes
    - search.suggest
    - search.highlight
    - content.code.copy
    - toc.follow
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

plugins:
  - search
  - awesome-pages

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true

# Anything under docs_dir is fair game for the site. Build artifacts (site/) and tooling
# (scripts/, .github/) live outside docs/ so they're not picked up.

