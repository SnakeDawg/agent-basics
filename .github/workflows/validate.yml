name: validate

on:
  pull_request:
  push:
    branches-ignore:
      - main

jobs:
  catalogue:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Validate frontmatter and naming
        run: python3 scripts/validate.py
      - name: Check README index is up to date
        run: python3 scripts/index-readme.py --check
