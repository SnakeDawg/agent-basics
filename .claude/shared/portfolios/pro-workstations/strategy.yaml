horizon: 2026-2028

strategic_vision: |
  Establish Pro Workstation as the default workstation choice for AI-augmented
  professional workflows — the platform where CAD, simulation, content
  creation, and on-device AI inference all converge.

where_we_play:
  customer_segments:
    - id: engineering-manufacturing
      name: Engineering / Manufacturing
      description: CAD, CAE, CAM, PLM workflows
    - id: aec
      name: AEC (Architecture, Engineering, Construction)
      description: Revit, ArchiCAD, BIM, large drawing sets
    - id: media-entertainment
      name: Media & Entertainment
      description: Video editing, 3D animation, VFX, color grading, audio
    - id: scientific-research
      name: Scientific / Research
      description: Data analysis, GIS, lab data, ML model development
    - id: financial-services
      name: Financial Services
      description: Multi-monitor trading, quantitative modeling, risk simulation
    - id: healthcare
      name: Healthcare
      description: Medical imaging, PACS, genomics workstations
  geographies:
    - Global, with strongest position in North America manufacturing/AEC and EMEA engineering verticals
  form_factors:
    - Mobile (laptops 14–17")
    - Desktop (compact, tower)
    - Rack (centralized)

how_we_win:
  - title: ISV partnership depth
    description: |
      Pro Workstation is independently certified across the broadest set of
      professional ISVs in the industry — competitors must match this on
      every refresh.
  - title: NVIDIA RTX professional GPU lineup
    description: |
      Pro-grade drivers, ECC memory, multi-app stability that consumer GeForce
      cards cannot match for production use.
  - title: Configurability advantage
    description: |
      Tower workstations remain fully serviceable and upgradable in an
      industry trending toward sealed designs.
  - title: Reliability under sustained load
    description: |
      Thermal design, component selection, and burn-in testing tuned for
      8–12 hour rendering, simulation, and inference workloads.
  - title: AI workstation positioning
    description: |
      Pro Workstation as the on-ramp for professionals running local LLMs,
      fine-tuning models, or doing AI-augmented design — bridging individual
      workstation use and IDG AI infrastructure.

priorities:
  - id: mobile-share-gain
    title: Mobile workstation share gain
    rationale: Close gap against Lenovo ThinkPad P-series; emphasize thin-and-light pro segment (Pro Workstation 5000 series).
    status: active
  - id: ai-workstation-narrative
    title: AI workstation narrative
    rationale: Establish Pro Workstation as the AI-ready pro device; partner with NVIDIA, ISVs on validated AI workflows.
    status: active
  - id: isv-refresh-cadence
    title: ISV refresh cadence
    rationale: Maintain certifications through the 14th-gen Intel / Core Ultra and AMD Ryzen Pro refresh; add new ISVs in scientific/ML segment.
    status: committed
  - id: margin-defense
    title: Margin defense
    rationale: Premium tier mix, services attach (AcmeCare Plus, AcmeDeploy for Pro Workstation specifically).
    status: committed
  - id: sustainability-scorecard
    title: Sustainability scorecard
    rationale: Recycled aluminum chassis, recycled materials in packaging — increasingly important in EMEA RFPs.
    status: committed

success_metrics:
  - Workstation segment market share (per IDC / Gartner workstation tracker) overall and by form factor
  - Mobile workstation share specifically (the contested segment vs Lenovo)
  - Premium SKU mix (Pro Workstation 7000 series) as proxy for margin
  - ISV certification count and ISV co-marketing engagements
  - AcmeCare Plus attach rate (Pro Workstation-specific)
  - NPS within the workstation buyer segment

time_horizons:
  now: |
    Execute current refresh; defend share in core engineering and AEC accounts;
    respond to Lenovo P-series moves.
  next: |
    AI workstation category launch and validation; deeper ML/data science ISV
    certifications; mobile workstation thin-and-light positioning.
  future: |
    New form factors for AI workloads (multi-GPU compact desktops, Pro Workstation
    tower with AI-specific options); deeper integration with IDG AI infrastructure
    as a hybrid story.

key_competitors:
  - id: hp-z
    note: Closest peer; strong in M&E and creative; ZBook Studio is a notable mobile competitor.
  - id: lenovo-thinkstation
    note: Strongest in mobile workstation segment; very competitive in AEC and engineering.
  - id: apple
    note: Formidable in M&E and software development; less relevant in CAD/CAE due to ISV gaps.
  - id: microsoft-surface-business
    note: Niche; no real workstation tier but creeps into creative segments.
  - id: boutique-builders
    note: BOXX, Puget — niche but high-credibility in performance segments.

key_risks:
  - Lenovo P-series mobile share momentum
  - Apple ecosystem expansion into traditional Pro Workstation customer bases (especially M&E)
  - Workstation TAM softening if AI inference moves to cloud rather than on-device
  - ISV consolidation reducing differentiation if certifications become table stakes
  - NVIDIA pro-GPU supply constraints affecting refresh cadence

review_cadence: quarterly

placeholders:
  - "Confirm priorities, segment targets, and competitor share intel against current Pro Workstation portfolio AOP."

last_reviewed: 2026-05-05
